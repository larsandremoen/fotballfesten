name: Frogner billettvakt

on:
  schedule:
    # Cron kan berre starte kvart 5. min, men kvar køyring køyrer «watch»-modus
    # som loopar internt (~kvar 15. s) i knappe 5 min. Slik får vi nær
    # samanhengande sjekk med korte, sjølvlækjande køyringar.
    # UTC-time 04–22 = ca. 06–00 lokal sommartid, dvs. pause 01–06 lokalt.
    # Merk: GitHub garanterer ikkje eksakt intervall; planlagte jobbar kan forseinkast.
    - cron: "*/5 4-22 * * *"
  workflow_dispatch:

concurrency:
  # Eigen gruppe: hindrar at to billettsjekk-køyringar overlappar, utan å
  # blokkere puls-workflowen (som har si eiga gruppe).
  group: frogner-billettvakt-check
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    # Hard tryggleik: watch-modus avsluttar sjølv etter WATCH_MAX_SECONDS (270s),
    # men dette hindrar ei jobb i å henge for evig dersom noko går gale.
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sjekk billettstatus (watch-loop)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node src/check.js watch

      - name: Lagre markffil ved treff
        if: success()
        run: |
          if [ -f state/detected.flag ] && [ -n "$(git status --porcelain state/detected.flag)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/detected.flag
            git commit -m "Billettvakt: treff registrert"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push
          else
            echo "Ingen ny markffil å committe."
          fi
